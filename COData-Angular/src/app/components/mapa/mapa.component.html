<div class="h-[calc(100vh-64px)] relative overflow-hidden rounded-2xl shadow-inner bg-gray-200">
  <div id="map" class="w-full h-full z-0 cursor-crosshair"></div>

  <div class="absolute top-6 left-6 z-10 space-y-4 w-80">
    <div class="bg-white/90 backdrop-blur-md p-6 rounded-2xl shadow-xl border border-gray-100 pointer-events-auto">
      <h2 class="text-xl font-bold text-gray-900 mb-2">Filtros de Reportes</h2>
      <p class="text-sm text-gray-500 mb-4">Visualiza incidencias por categoría.</p>
      <div class="space-y-2">
        <button class="w-full flex items-center justify-between p-3 rounded-xl bg-red-50 text-red-700 hover:bg-red-100 transition-colors">
          <span class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-red-600"></span> Críticos
          </span>
          <span class="font-bold">12</span>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="mostrarModal" class="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-fade-in-up">
      <div class="bg-[#8B1538] p-4 text-white flex justify-between items-center">
        <h3 class="text-lg font-bold">
          {{ modoEdicion ? 'Detalle del Reporte' : 'Nuevo Reporte Georreferenciado' }}
        </h3>
        <button (click)="cerrarModal()" title="Cerrar modal" class="text-white hover:text-gray-200 transition-colors">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <div class="p-6 space-y-4">
        <div class="text-xs text-gray-500 bg-gray-100 p-2 rounded-lg flex gap-2">
          <span><b>Lat:</b> {{ reporteActual.lat | number:'1.4-4' }}</span>
          <span><b>Lng:</b> {{ reporteActual.lng | number:'1.4-4' }}</span>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
          <select [(ngModel)]="reporteActual.categoria" title="Seleccionar categoría" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-[#8B1538] focus:border-[#8B1538] outline-none transition-all">
            <option value="" disabled selected>Seleccione una categoría</option>
            <option value="Bache">Bache</option>
            <option value="Fuga de Agua">Fuga de Agua</option>
            <option value="Alumbrado Público">Alumbrado Público</option>
            <option value="Basura">Acumulación de Basura</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label>
          <textarea [(ngModel)]="reporteActual.descripcion" rows="3" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-[#8B1538] focus:border-[#8B1538] outline-none transition-all resize-none" placeholder="Describe el problema en esta ubicación..."></textarea>
        </div>

        <div class="flex gap-3 pt-4 border-t border-gray-100">
          <button *ngIf="modoEdicion" (click)="eliminarReporte()" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg font-semibold hover:bg-red-200 transition-colors">
            Eliminar
          </button>
          
          <div class="flex-1"></div> <button (click)="cerrarModal()" class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg transition-colors">
            Cancelar
          </button>
          <button (click)="guardarReporte()" class="px-6 py-2 bg-[#8B1538] text-white rounded-lg font-bold shadow-md hover:bg-[#6c102a] hover:shadow-lg transition-all">
            Guardar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
